<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Premium Finance Tracker</title>

    <link rel="stylesheet" href="style.css" />

  
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  </head>

  <body>
   
    <nav class="navbar">
      <div class="logo">
        <i class="fa-solid fa-wallet"></i>
        Finance Tracker
      </div>


    </nav>

    
    <section class="hero">
      <div class="hero-content">
        <h1>Track Your Expenses Smartly 💰</h1>

        <p>
          Manage budgets, analyze spending, and improve your financial habits.
        </p>

        <button class="hero-btn">
          <i class="fa-solid fa-chart-pie"></i>
          Finance Dashboard
        </button>
      </div>

      <div class="hero-image">
        <img
          src="https://images.unsplash.com/photo-1554224155-6726b3ff858f?q=80&w=1200&auto=format&fit=crop"
          alt="Finance"
        />
      </div>
    </section>

   
    <section class="summary">
      <div class="card">
        <i class="fa-solid fa-money-bill-wave"></i>
        <h3>Budget</h3>
        <h2 id="budgetDisplay">₹0</h2>
      </div>

      <div class="card">
        <i class="fa-solid fa-credit-card"></i>
        <h3>Expenses</h3>
        <h2 id="expenseDisplay">₹0</h2>
      </div>

      <div class="card">
        <i class="fa-solid fa-wallet"></i>
        <h3>Balance</h3>
        <h2 id="balanceDisplay">₹0</h2>
      </div>
    </section>

    <div id="warning"></div>

  
    <section class="budget-section">
      <input type="number" id="budgetInput" placeholder="Set Monthly Budget" />

      <button id="setBudgetBtn">Save Budget</button>
    </section>


    <section class="form-section">
      <h2>Add Expense</h2>

      <form id="expenseForm">
        <input type="text" id="title" placeholder="Expense Title" required />

        <input type="number" id="amount" placeholder="Amount" required />

        <select id="category" required>
          <option value="">Select Category</option>
          <option>Food</option>
          <option>Travel</option>
          <option>Shopping</option>
          <option>Bills</option>
          <option>Entertainment</option>
        </select>

        <input type="date" id="date" required />

        <button type="submit">
          <i class="fa-solid fa-plus"></i>
          Add Expense
        </button>
      </form>
    </section>

  
    <section class="filter-section">
      <input type="text" id="searchInput" placeholder="Search Expense" />

      <select id="filterCategory">
        <option value="All">All Categories</option>
        <option>Food</option>
        <option>Travel</option>
        <option>Shopping</option>
        <option>Bills</option>
        <option>Entertainment</option>
      </select>
    </section>

   
    <section class="table-section">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="expenseTable"></tbody>
      </table>
    </section>

    
     <section class="charts">

    <div class="chart-card">
      <canvas id="pieChart"></canvas>
    </div>

    <div class="chart-card">
      <canvas id="barChart"></canvas>
    </div>

  </section>

    <script src="script.js"></script>
  </body>
</html>
